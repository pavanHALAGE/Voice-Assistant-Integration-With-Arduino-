<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AI Home Automation</title>

<link rel="stylesheet"
href="{{ url_for('static',filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>🏠 AI Home Automation</h1>

<div class="statusCard">

<h2>Device Status</h2>

<p>💡 Bulb :
<span id="bulb">OFF</span></p>

<p>🌀 Fan :
<span id="fan">OFF</span></p>

<p>🕒 Time :
<span id="time"></span></p>

<p>📅 Date :
<span id="date"></span></p>

</div>

<div class="controlCard">

<h2>Bulb</h2>

<button onclick="bulbOn()">ON</button>

<button onclick="bulbOff()">OFF</button>

</div>

<div class="controlCard">

<h2>Fan</h2>

<button onclick="fanOn()">ON</button>

<button onclick="fanOff()">OFF</button>

</div><div class="statusCard">
    <h3>ESP32 Status</h3>

<p id="espStatus">Disconnected</p>

<h2>🤖 AI Assistant (Llama 3.2)</h2>

<input
type="text"
id="question"
placeholder="Ask anything..."
style="width:80%;height:40px;font-size:18px;">

<br><br>

<button onclick="askAI()">

Ask AI

</button>

<br><br>

<textarea
id="answer"
rows="8"
style="width:90%;font-size:18px;"
readonly>

</textarea>

</div>

<div class="footer">

AI Home Automation using ESP32,
Arduino UNO,
Ollama Llama3.2:3B

</div>

<script src="{{ url_for('static',filename='script.js') }}"></script>
<div class="statusCard">

<h2>📜 Recent Commands</h2>

<div id="history">

Waiting...

</div>

</div>

</body>
</html>
